<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de Cierre Pro - Mundo</title>
    <style>
        /* =========================================
           TEMAS Y VARIABLES (AZUL CORPORATIVO MUNDO)
           ========================================= */
        :root {
            /* COLORES OFICIALES MUNDO (AZUL) */
            --mundo-primary: #002B7F; 
            --mundo-secondary: #0055FF; 
            --mundo-gradient: linear-gradient(135deg, #002B7F 0%, #0055FF 100%);
            
            /* TEMA CLARO */
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --bg-header: #ffffff;
            --text-main: #334155;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --input-bg: #ffffff;
            --input-focus-ring: rgba(0, 85, 255, 0.15);
            --highlight-bg: #eff6ff; 
            --highlight-text: #002B7F;
            --btn-text: #ffffff;
            --success: #10b981;
            --success-bg: #ecfdf5;
            --warning-bg: #fffbeb;
            --warning-border: #f59e0b;
            
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --radius-md: 8px;
            --radius-lg: 12px;
        }

        /* 🔴 TEMA GRABACIÓN (ROJO/ALERTA) */
        body.modo-grabacion {
            --mundo-primary: #b91c1c; 
            --mundo-secondary: #ef4444; 
            --mundo-gradient: linear-gradient(135deg, #b91c1c 0%, #ef4444 100%);
            --input-focus-ring: rgba(239, 68, 68, 0.15);
            --highlight-bg: #fef2f2;
            --highlight-text: #b91c1c;
        }

        [data-theme="dark"] {
            /* TEMA OSCURO */
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --bg-header: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --input-bg: #0f172a;
            --input-focus-ring: rgba(96, 165, 250, 0.25);
            --highlight-bg: #1e3a8a;
            --highlight-text: #bfdbfe;
            --btn-text: #ffffff;
            --success: #34d399;
            --success-bg: rgba(16, 185, 129, 0.1);
            
            --mundo-primary: #60a5fa;
            --mundo-secondary: #93c5fd;
            --mundo-gradient: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
        }

        /* 🔴 TEMA GRABACIÓN OSCURO */
        body[data-theme="dark"].modo-grabacion {
            --mundo-primary: #f87171;
            --mundo-secondary: #fca5a5;
            --mundo-gradient: linear-gradient(135deg, #ef4444 0%, #f87171 100%);
            --input-focus-ring: rgba(248, 113, 113, 0.25);
            --highlight-bg: #450a0a;
            --highlight-text: #fecaca;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            color: var(--text-main);
            background-color: var(--bg-body);
            margin: 0;
            padding-bottom: 60px;
            transition: background-color 0.3s, color 0.3s;
            -webkit-font-smoothing: antialiased;
        }

        /* =========================================
           ENCABEZADO
           ========================================= */
        header {
            background-color: var(--bg-header);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 30px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-title {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--mundo-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .header-controls { display: flex; align-items: center; gap: 24px; }

        .theme-btn {
            background: var(--bg-body); border: 1px solid var(--border-color);
            color: var(--text-muted); padding: 6px 12px; border-radius: 20px;
            cursor: pointer; font-weight: 500; font-size: 0.85rem;
            display: flex; align-items: center; gap: 6px; transition: all 0.2s;
        }
        .theme-btn:hover { color: var(--text-main); border-color: var(--text-muted); }

        .stepper {
            display: flex; align-items: center; gap: 10px; font-size: 0.85rem;
            font-weight: 600; color: var(--text-muted);
        }
        .step { display: flex; align-items: center; gap: 6px; }
        .step.active { color: var(--mundo-secondary); }
        .step-num {
            background: var(--border-color); color: var(--bg-body);
            width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; font-size: 0.8rem; font-weight: 700;
        }
        .step.active .step-num { background: var(--mundo-gradient); color: white; }
        .step-divider { height: 1px; width: 24px; background: var(--border-color); }

        /* =========================================
           VISTAS Y CONTENEDORES
           ========================================= */
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .view { display: none; animation: fadeIn 0.3s ease forwards; }
        .view.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-form {
            background: var(--bg-card); border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm); padding: 40px; border: 1px solid var(--border-color);
        }

        /* TIPO DE VALIDACIÓN (MASTER SWITCH) */
        .master-switch-container {
            background: var(--bg-body); border: 1px solid var(--border-color);
            border-radius: var(--radius-md); padding: 16px; margin-bottom: 32px;
        }
        .master-switch-container h3 {
            margin: 0 0 12px 0; color: var(--text-main); font-size: 0.95rem;
            font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
        }

        .tabs-horizontales {
            display: flex; gap: 8px; margin-bottom: 32px;
            border-bottom: 2px solid var(--border-color); padding-bottom: 0;
        }
        .tab-btn {
            flex: none; background: transparent; border: none; color: var(--text-muted);
            font-size: 1rem; font-weight: 600; padding: 12px 24px;
            cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px;
            transition: all 0.2s ease;
        }
        .tab-btn:hover { color: var(--mundo-secondary); }
        .tab-btn.active { color: var(--mundo-secondary); border-bottom: 2px solid var(--mundo-secondary); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Formulario GRID MINIMALISTA */
        .grid-form {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px;
        }
        .span-2 { grid-column: span 2; }
        .span-full { grid-column: 1 / -1; }
        @media (max-width: 768px) { .span-2 { grid-column: span 1; } }

        label {
            display: block; font-size: 0.8rem; font-weight: 600;
            color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"], input[type="email"], input[type="tel"], input[type="date"], select {
            width: 100%; padding: 10px 12px; background-color: var(--input-bg);
            border: 1px solid var(--border-color); color: var(--text-main);
            border-radius: var(--radius-md); font-size: 0.95rem; box-sizing: border-box;
            font-family: inherit; transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus, select:focus {
            outline: none; border-color: var(--mundo-secondary);
            box-shadow: 0 0 0 3px var(--input-focus-ring);
        }

        .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; }
        .checkbox-group label {
            font-weight: 500; font-size: 0.9rem; color: var(--text-main);
            display: flex; align-items: center; gap: 8px; cursor: pointer;
        }
        .checkbox-group input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--mundo-secondary); cursor: pointer; }

        .toggle-group {
            display: flex; background: var(--bg-body); border: 1px solid var(--border-color);
            border-radius: var(--radius-md); overflow: hidden; padding: 4px;
        }
        .toggle-group input[type="radio"] { display: none; }
        .toggle-group label {
            flex: 1; text-align: center; padding: 8px; margin: 0; cursor: pointer;
            font-size: 0.85rem; font-weight: 600; color: var(--text-muted); border-radius: 4px;
            transition: all 0.2s;
        }
        .toggle-group input[type="radio"]:checked + label {
            background: var(--bg-card); color: var(--mundo-primary); box-shadow: var(--shadow-sm);
        }

        .master-switch-container .toggle-group { padding: 6px; border-radius: 10px; }
        .master-switch-container .toggle-group label { font-size: 1rem; padding: 14px; border-radius: 6px; }
        .master-switch-container .toggle-group input[type="radio"]:checked + label {
            background: var(--mundo-gradient); color: #ffffff; box-shadow: var(--shadow-md); border-color: transparent;
        }

        .sub-caja {
            background: var(--bg-body); padding: 16px; border-radius: var(--radius-md); 
            border: 1px solid var(--border-color); margin-top: 8px;
        }
        .btn-linea {
            background: var(--highlight-bg); border: 1px dashed var(--mundo-secondary);
            color: var(--mundo-secondary); padding: 12px; border-radius: var(--radius-md);
            font-weight: 600; cursor: pointer; transition: all 0.2s; width: 100%;
        }
        .btn-linea:hover { background: var(--mundo-secondary); color: #fff; }

        .btn-accion-principal {
            background: var(--mundo-gradient); color: #fff; border: none; padding: 16px 32px;
            font-size: 1.1rem; font-weight: 600; border-radius: var(--radius-md); cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 8px; transition: opacity 0.2s;
            width: 100%; margin-top: 32px; letter-spacing: 0.5px;
        }
        .btn-accion-principal:hover { opacity: 0.9; }

        /* =========================================
           VISTA 2: LECTURA ENFOCADA (TELEPROMPTER)
           ========================================= */
        .lectura-wrapper { max-width: 800px; margin: 0 auto; }

        .card-lectura {
            background: var(--bg-card); border-radius: var(--radius-lg); box-shadow: var(--shadow-md);
            padding: 50px; border: 1px solid var(--border-color);
        }

        .estilo-guion { font-size: 1.15rem; line-height: 1.7; color: var(--text-main); }
        .estilo-guion h3 { color: var(--mundo-primary); font-size: 1.3rem; margin-top: 30px; margin-bottom: 10px; text-transform: uppercase;}
        .estilo-guion h4 { color: var(--mundo-secondary); font-size: 1.1rem; margin-top: 25px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .estilo-guion .variable {
            font-weight: 700; color: var(--mundo-primary); background-color: var(--highlight-bg);
            padding: 2px 6px; border-radius: 4px;
        }
        
        .estilo-guion .plan-descripcion {
            font-weight: 500; font-style: italic; color: var(--text-main); background-color: var(--bg-body);
            padding: 16px; border-left: 3px solid var(--mundo-secondary); border-radius: 0 4px 4px 0; margin: 16px 0;
            font-size: 1.05rem;
        }
        
        .estilo-guion .bullet-list { margin-left: 0; padding-left: 20px; margin-bottom: 20px; }
        .estilo-guion .bullet-item { margin-bottom: 10px; }
        
        .salvavidas-box {
            background: var(--highlight-bg); border: 1px solid var(--mundo-primary); 
            border-left: 5px solid var(--mundo-primary); padding: 20px; margin-top: 40px; border-radius: var(--radius-md);
        }
        .salvavidas-box h3 { color: var(--mundo-primary); margin-top: 0; }

        .acciones-lectura { display: flex; gap: 16px; margin-top: 32px; }
        .btn-secundario {
            background: var(--bg-body); color: var(--text-main); border: 1px solid var(--border-color);
            padding: 14px 24px; font-size: 1rem; font-weight: 600; border-radius: var(--radius-md);
            cursor: pointer; flex: 1; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-secundario:hover { border-color: var(--text-muted); }
        
        .btn-copiar {
            background: var(--success); color: #fff; border: none; padding: 14px 24px;
            font-size: 1rem; font-weight: 600; border-radius: var(--radius-md); cursor: pointer; flex: 2;
            display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.2s;
        }
        .btn-copiar:hover { opacity: 0.9; }

        @media (max-width: 600px) { 
            .card-lectura { padding: 30px 20px; } 
            .acciones-lectura { flex-direction: column; }
        }
    </style>
</head>
<body data-theme="light">

    <header>
        <div class="logo-title">
            <span style="font-size: 1.8rem;">🔵</span> Validador Mundo
        </div>
        <div class="header-controls">
            <div class="stepper">
                <div class="step active" id="step-1"><div class="step-num">1</div> Configurar</div>
                <div class="step-divider"></div>
                <div class="step" id="step-2"><div class="step-num">2</div> Teleprompter</div>
            </div>
            <button class="theme-btn" onclick="toggleTheme()" title="Cambiar tema">
                <span id="theme-icon">🌙</span> <span id="theme-text">Oscuro</span>
            </button>
        </div>
    </header>

    <div class="container">
        
        <!-- VISTA 1: FORMULARIO -->
        <div id="vista-formulario" class="view active">
            <div class="card-form" id="main-form-card">
                
                <div class="master-switch-container">
                    <h3>Escenario de Venta</h3>
                    <div class="toggle-group">
                        <input type="radio" id="escenario-bio" name="escenario_venta" value="biometria" checked onchange="toggleEscenario()">
                        <label for="escenario-bio">Validación Biométrica</label>
                        
                        <input type="radio" id="escenario-grab" name="escenario_venta" value="grabacion" onchange="toggleEscenario()">
                        <label for="escenario-grab">Contrato por Grabación</label>
                    </div>
                </div>
                
                <div class="grid-form" style="margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--border-color);">
                    <div class="span-full">
                        <label>Nombre del Ejecutivo</label>
                        <input type="text" id="in-ejecutivo" placeholder="Ej. Carlos Martínez">
                    </div>
                </div>

                <div class="tabs-horizontales">
                    <button class="tab-btn active" onclick="seleccionarServicio('hogar')">Servicios Hogar</button>
                    <button class="tab-btn" onclick="seleccionarServicio('movil')">Servicios Móviles</button>
                </div>

                <!-- FORMULARIO HOGAR -->
                <div id="form-hogar" class="tab-content active">
                    <div class="grid-form">

                        <div><label>Nombre del Cliente</label><input type="text" id="in-h-nombre" placeholder="Ej. Juan Pérez"></div>
                        <div><label>RUT del Cliente</label><input type="text" id="in-h-rut" placeholder="12.345.678-9"></div>
                        
                        <div class="span-full">
                            <label>Oferta Adquirida</label>
                            <select id="in-h-oferta">
                                <option value="">Seleccione el plan...</option>
                                <optgroup label="1 Mundo">
                                    <option value="1M 800M">1M 800M</option><option value="1M 1000M">1M 1000M</option>
                                    <option value="1M 2000M">1M 2000M</option><option value="1M 3000M">1M 3000M</option>
                                    <option value="1M 10GB">1M 10GB</option><option value="1M Mundo GO">1M Mundo GO</option>
                                </optgroup>
                                <optgroup label="2 Mundo">
                                    <option value="2M 800 + GO">2M 800 + GO</option><option value="2M 1000 + GO">2M 1000 + GO</option>
                                    <option value="2M 3GB + GO">2M 3GB + GO</option><option value="2M 10GB + GO">2M 10GB + GO</option>
                                </optgroup>
                                <optgroup label="3 Mundo">
                                    <option value="3M 1000 + GO + FJ">3M 1000 + GO + FJ</option>
                                    <option value="3M 3000 + GO + FJ">3M 3000 + GO + FJ</option>
                                    <option value="3M 10GB + GO + FJ">3M 10GB + GO + FJ</option>
                                </optgroup>
                            </select>
                        </div>
                        
                        <div class="span-2">
                            <label>Características a Mencionar</label>
                            <div class="checkbox-group">
                                <label><input type="checkbox" id="chk-h-internet" checked> <span>Internet Fibra</span></label>
                                <label><input type="checkbox" id="chk-h-tv"> <span>TV Mundo Go</span></label>
                                <label><input type="checkbox" id="chk-h-fono" onchange="toggleFono()"> <span>Telefonía Fija</span></label>
                            </div>
                        </div>

                        <!-- Detalles Telefonía Fija -->
                        <div id="box-h-fono-detalles" class="span-full sub-caja" style="display: none;">
                            <label>Tipo de Línea Fija</label>
                            <div class="toggle-group" style="margin-bottom: 12px; width: max-content;">
                                <input type="radio" id="h-fijo-nueva" name="tipo_h_linea_fija" value="nueva" checked onchange="toggleFonoPorta()">
                                <label for="h-fijo-nueva" style="padding: 6px 16px;">Nueva</label>
                                <input type="radio" id="h-fijo-porta" name="tipo_h_linea_fija" value="portabilidad" onchange="toggleFonoPorta()">
                                <label for="h-fijo-porta" style="padding: 6px 16px;">Portabilidad</label>
                            </div>

                            <div id="box-h-fono-porta" style="display: none;">
                                <div style="display: flex; gap: 16px; flex-wrap: wrap;">
                                    <div style="flex: 1; min-width: 200px;">
                                        <label>Número a Portar (Fijo)</label>
                                        <input type="text" id="in-h-num-portar" placeholder="Ej. 223456789">
                                    </div>
                                    <div style="flex: 1; min-width: 200px;">
                                        <label>Compañía Donante</label>
                                        <select id="in-h-compania">
                                            <option value="[Compañía]">Seleccione...</option>
                                            <option value="Entel">Entel</option><option value="Movistar">Movistar</option>
                                            <option value="Claro">Claro</option><option value="VTR">VTR</option><option value="GTD">GTD / Telsur</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div><label>Dirección de Instalación</label><input type="text" id="in-h-direccion" placeholder="Ej. Calle Los Pinos 123"></div>
                        <div><label>Fecha de Agenda</label><input type="date" id="in-h-fecha"></div>
                        <div>
                            <label>Franja Horaria</label>
                            <select id="in-h-franja">
                                <option value="[Franja]">Seleccionar...</option>
                                <option value="AM (09:00 a 14:00 hrs)">AM (Mañana)</option>
                                <option value="PM (14:00 a 19:00 hrs)">PM (Tarde)</option>
                            </select>
                        </div>
                        <div class="span-2"><label>Productos Adicionales (Opcional)</label><input type="text" id="in-h-adicionales" placeholder="Ej. 1 Deco extra por $2.500"></div>

                        <div><label>Correo Electrónico</label><input type="email" id="in-h-correo" placeholder="cliente@correo.cl"></div>
                        <div><label>Celular Principal</label><input type="tel" id="in-h-num1" placeholder="9 1234 5678"></div>
                        <div><label>Celular Secundario</label><input type="tel" id="in-h-num2" placeholder="Opcional"></div>
                        <div>
                            <label>Tipo de Cliente</label>
                            <div class="toggle-group">
                                <input type="radio" id="h-nuevo" name="tipo_h_cliente" value="nuevo" checked onchange="toggleCiclo('hogar')">
                                <label for="h-nuevo">Nuevo</label>
                                <input type="radio" id="h-actual" name="tipo_h_cliente" value="actual" onchange="toggleCiclo('hogar')">
                                <label for="h-actual">Actual</label>
                            </div>
                        </div>
                        <div id="box-h-ciclo" style="display: none;">
                            <label>Ciclo Actual</label>
                            <select id="in-h-ciclo">
                                <option value="[Ciclo]">Seleccionar...</option>
                                <option value="1">Ciclo 1</option><option value="5">Ciclo 5</option>
                                <option value="10">Ciclo 10</option><option value="15">Ciclo 15</option>
                                <option value="20">Ciclo 20</option><option value="25">Ciclo 25</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- FORMULARIO MÓVIL -->
                <div id="form-movil" class="tab-content">
                    <div class="grid-form">

                        <div><label>Nombre del Cliente</label><input type="text" id="in-m-nombre" placeholder="Ej. Ana Soto"></div>
                        <div><label>RUT del Cliente</label><input type="text" id="in-m-rut" placeholder="19.876.543-2"></div>
                        
                        <!-- CONTENEDOR DINÁMICO DE LÍNEAS MÓVILES -->
                        <div class="span-full">
                            <label style="border-bottom: 2px solid var(--border-color); padding-bottom: 8px;">📦 Líneas Móviles (Máx. 5)</label>
                            <div id="contenedor-lineas-movil">
                                <!-- Las líneas se inyectan acá vía JS -->
                            </div>
                            <button type="button" class="btn-linea" onclick="agregarLineaMovil()">➕ Agregar Otra Línea</button>
                        </div>
                        
                        <div>
                            <label>Método de Entrega (SIMs)</label>
                            <div class="toggle-group">
                                <input type="radio" id="m-entrega-dom" name="tipo_m_entrega" value="domicilio" checked onchange="toggleEntrega()">
                                <label for="m-entrega-dom">Domicilio</label>
                                <input type="radio" id="m-entrega-suc" name="tipo_m_entrega" value="sucursal" onchange="toggleEntrega()">
                                <label for="m-entrega-suc">Sucursal</label>
                            </div>
                        </div>
                        <div id="box-m-direccion"><label>Dirección Envío</label><input type="text" id="in-m-direccion" placeholder="Av. Providencia 1234"></div>
                        <div id="box-m-sucursal" style="display: none;"><label>Opciones Sucursal</label>
                            <input type="text" id="in-m-direccion-sucursal" placeholder="Dirección de la sucursal" style="margin-bottom: 10px;">
                            <div class="checkbox-group">
                                <label><input type="checkbox" id="chk-m-prioritario"> <span>Retiro prioritario (hoy)</span></label>
                            </div>
                        </div>

                        <div><label>Correo Electrónico</label><input type="email" id="in-m-correo" placeholder="cliente@correo.cl"></div>
                        <div><label>Celular Contacto</label><input type="tel" id="in-m-num1" placeholder="9 1234 5678"></div>
                        <div><label>Celular Secundario</label><input type="tel" id="in-m-num2" placeholder="Opcional"></div>
                        
                        <div>

        function volverEdicion() {
            document.getElementById('vista-lectura').classList.remove('active');
            document.getElementById('vista-formulario').classList.add('active');
            document.getElementById('step-2').classList.remove('active');
            document.getElementById('step-1').classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function copiarAlPortapapeles() {
            const divTexto = document.getElementById('contenedor-texto');
            let textoLimpio = divTexto.innerText.replace(/🚨|✅|⚠️/g, '').replace(/\n{3,}/g, '\n\n').trim();
            navigator.clipboard.writeText(textoLimpio).then(() => {
                const btn = document.getElementById('btn-accion-resultado');
                const originalContent = btn.innerHTML;
                btn.innerHTML = "¡Copiado!";
                btn.style.background = "var(--success)";
                setTimeout(() => {
                    btn.innerHTML = originalContent;
                    btn.style.background = "";
                }, 3000);
            }).catch(() => alert("Selecciona el texto y presiona Ctrl+C"));
        }
    </script>
